---
layout: primary
---

<div class="posts-header">
    <!-- <div class="container"> -->
        <div class="posts-header-title">
            <h1>An Idiot Invests</h1>
            <h2>Investing Lifestyle Finance</h2>
        </div>
    <!-- </div> -->
</div>

<div class="post-content">

    <div class="featured-posts-title">
        <h3>Featured Blog Posts</h3>
    </div>

    <table id="postContainer" class="posts-pagination-table">

    {% for post in site.posts %}

        <div class="pageinator">
            <div class="post-listing-card">
                <img src="{{ post.imgUrl }}" alt="Img Not Found">

                <div class="container-fluid">

                    <h2> <a class="anc-hover" href="{{ post.url | absolute_url }}">{{ post.title }}</a> </h2>

                    <div class="sample-post-text">
                        <p class="sample-post-text">{{ post.post_decription }}...</p>
                    </div>

                    <div class="date-posted-stamp">
                        {% assign date_format = site.date_format | default: "%B %-d, %Y" %}
                        <p>Posted: {{ post.date | date: date_format }} </p>
                    </div>

                </div>

            </div>
        </div>

    {% endfor %}

    </table>

</div>
